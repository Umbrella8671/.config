# tmux configuration
# Based on https://github.com/tmux/tmux/wiki

# ╭──────────────────────────────────────────────────────────────╮
# │  tmux.conf — Prefix-free，全用 Option(Alt) 键直接触发        │
# │  适配：Mac Terminal + Vim + VS Code                          │
# ╰──────────────────────────────────────────────────────────────╯
# Terminal → Preferences → Profiles → Keyboard → ☑ Use Option as Meta key
# VS Code settings.json → "terminal.integrated.macOptionIsMeta": true

# ── Server ────────────────────────────────────────────────────────────────────
set -s escape-time 0                                                # ESC 键无延迟，避免 Vim 切换模式卡顿
set -s extended-keys on                                             # 开启扩展按键支持（功能键、修饰键组合）
set -as terminal-features 'xterm*:extkeys'                          # 对 xterm 类终端启用扩展按键特性
set -g default-terminal "tmux-256color"                             # 默认终端类型，支持 256 色
set -as terminal-overrides ",xterm-256color:RGB"                    # 启用真彩色（24-bit RGB）
 


# ── 基础设置 ──────────────────────────────────────────────────────────────────
unbind C-b                                                          # 取消默认 Prefix Ctrl+b
set -g prefix C-a                                                   # 不使用任何 Prefix，全部改为直接快捷键
 
set -g mouse on                                                     # 开启鼠标支持（点击面板、滚轮翻页、拖拽调整大小）
set -g history-limit 100000                                         # 每个面板保留 10 万行滚动历史
set -g buffer-limit 20                                              # 最多保留 20 个复制缓冲区
set -g display-time 1500                                            # 状态栏提示信息显示 1.5 秒后消失
set -g focus-events on                                              # 终端焦点事件透传（VS Code / Vim autoread 需要）
set -g base-index 1                                                 # 窗口编号从 1 开始（而非 0）
set -g pane-base-index 1                                            # 面板编号从 1 开始（而非 0）
set -g renumber-windows on                                          # 关闭窗口后自动重新编号，保持连续
set -g set-clipboard on                                             # 允许终端程序访问 tmux 剪贴板
set -g detach-on-destroy off                                        # 关闭最后一个会话时不直接退出 tmux



# ── 窗口管理 ──────────────────────────────────────────────────────────────────
# Option+r 重新加载 tmux 配置文件，立即生效（修改配置后使用）
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded" 
bind -n M-c new-window -c "#{pane_current_path}"                    # Option+c        在当前路径下新建窗口
bind -n M-w choose-tree -Zw                                         # Option+w        打开窗口/会话树形选择列表（可预览、跳转）
bind -n M-D detach                                                  # Option+D        detach
bind -n M-] next-window                                             # Option+]        切换到右边（下一个）窗口
bind -n M-[ previous-window                                         # Option+[        切换到左边（上一个）窗口
# Option+1~5      直接跳转到对应编号的窗口（类似浏览器 Cmd+1~5）
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5



# ── 分屏 ──────────────────────────────────────────────────────────────────────
bind -n M-v split-window -hc "#{pane_current_path}"                 # Option+v        垂直分屏（左右并列），新面板继承当前目录（v = vertical）
bind -n M-s split-window -vc "#{pane_current_path}"                 # Option+s        水平分屏（上下堆叠），新面板继承当前目录（s = split horizontal）
bind -n M-m resize-pane -Z                                          # Option+m        最大化当前面板（再按一次还原，Zoom 切换）
bind -n M-= select-layout even-horizontal                           # Option+=        将所有面板均等分布为左右列（even-horizontal 布局）
bind -n M-- select-layout even-vertical                             # Option+-        将所有面板均等分布为上下行（even-vertical 布局）
bind -n M-x confirm-before -p "kill pane? (y/n)" kill-pane          # Option+x        关闭当前面板（会弹出确认提示，避免误操作）
 


# ── 面板导航 ──────────────────────────────────────────────────────────────────
bind -n M-h select-pane -L                                          # Option+h        光标移动到左边的面板
bind -n M-j select-pane -D                                          # Option+j        光标移动到下方的面板
bind -n M-k select-pane -U                                          # Option+k        光标移动到上方的面板
bind -n M-l select-pane -R                                          # Option+l        光标移动到右边的面板
bind -n M-H resize-pane -L 5                                        # Option+H        向左扩大当前面板边界 5 格
bind -n M-J resize-pane -D 5                                        # Option+J        向下扩大当前面板边界 5 格
bind -n M-K resize-pane -U 5                                        # Option+K        向上扩大当前面板边界 5 格
bind -n M-L resize-pane -R 5                                        # Option+L        向右扩大当前面板边界 5 格



# ── 复制模式（Vi 风格 + Mac 剪贴板）────────────────────────────────────────────
setw -g mode-keys vi                                                # 复制模式使用 Vi 按键（hjkl 移动、/ 搜索等）
set  -g status-keys vi                                              # 命令行模式也使用 Vi 按键
bind -n M-Enter copy-mode                                           # Option+Enter    进入复制模式（可用 hjkl 移动光标、/ 搜索历史输出）
bind -T copy-mode-vi v     send -X begin-selection                  # v               开始字符选择（进入复制模式后按）
bind -T copy-mode-vi V     send -X select-line                      # V               整行选择（进入复制模式后按）
bind -T copy-mode-vi C-v   send -X rectangle-toggle                 # Ctrl+v          切换矩形块选择模式（列选择，适合选代码列）
bind -T copy-mode-vi H     send -X start-of-line                    # H               跳到当前行行首（复制模式内）
bind -T copy-mode-vi L     send -X end-of-line                      # L               跳到当前行行尾（复制模式内）
bind -T copy-mode-vi Escape send -X cancel                          # Escape          退出复制模式，不复制任何内容
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"    # y               复制选中内容到系统剪贴板（pbcopy），可在 VS Code / 其他应用粘贴
unbind -T copy-mode-vi MouseDragEnd1Pane
bind   -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy" # 鼠标拖拽松开后  自动将选中内容复制到系统剪贴板（无需按 y）
bind -n M-p run "pbpaste | tmux load-buffer - && tmux paste-buffer" # Option+p        从系统剪贴板粘贴内容到当前面板（pbpaste）



# ── 状态栏 ───────────────────────────────────────────────────────────────────
set -g status on                                                                                  # 显示底部状态栏
set -g status-position bottom                                                                     # 状态栏位置：底部
set -g status-interval 5                                                                          # 每 5 秒刷新一次状态栏内容（时间、状态等）
set -g status-left-length  50                                                                     # 状态栏左侧最大字符宽度
set -g status-right-length 80                                                                     # 状态栏右侧最大字符宽度

# ------------ 粉色 ----------------------
set -g status-style 'bg=#f0f0f0,fg=#ff85ad'                                                       # 极浅灰背景（适配白底），深粉色文字（适配黑底）
set -g status-left '#[fg=#ffffff,bg=#ff85ad,bold] #S #[fg=#ff85ad,bg=#f0f0f0,nobold]  '           # 粉底白字，高亮醒目
set -g status-right '#[fg=#999999]%Y-%m-%d  #[fg=#333333,bold]%H:%M '                             # 深灰色日期，粉色加粗时间
set -g window-status-format         '#[fg=#b0b0b0] #I  #W '
set -g window-status-current-format '#[fg=#ffffff,bg=#ff85ad] #I  #W #[fg=#ff85ad,bg=#f0f0f0]'
set -g window-status-activity-style 'fg=#ff4d94'                                                  # 有活动时变深粉色

# ------------ 蓝色 ---------------------- 
# set -g status-style 'bg=#e8e8e8,fg=#333333'                                                     # 状态栏整体：浅灰底、深色字
# set -g status-left '#[fg=#ffffff,bg=#4a7eda,bold] #S #[fg=#4a7eda,bg=#e8e8e8,nobold]  '         # 左侧显示当前 Session 名称（蓝色背景高亮）
# set -g status-right '#[fg=#888888]%Y-%m-%d  #[fg=#333333,bold]%H:%M '                           # 右侧显示日期和时间
# set -g window-status-format '#[fg=#888888] #I  #W '                                             # 普通窗口标签样式：灰色，显示编号和名称
# set -g window-status-current-format '#[fg=#ffffff,bg=#4a7eda] #I  #W #[fg=#4a7eda,bg=#e8e8e8]'  # 当前激活窗口标签样式：蓝色背景高亮
# set -g window-status-activity-style 'fg=#cc3333'                                                # 有活动的窗口标签变红色提示

set -g window-status-separator      ''                                                            # 窗口标签之间无分隔符
set -g monitor-activity on                                                                        # 监控后台窗口的输出活动
set -g visual-activity off                                                                        # 有活动时只改变标签颜色，不弹出提示框



# ── 面板边框 ──────────────────────────────────────────────────────────────────
# ------------ 粉色 ----------------------
set -g pane-border-style        'fg=#dddddd'                                                      # 非活动：浅灰色，避免粉色干扰视觉
set -g pane-active-border-style 'fg=#ff85ad'                                                      # 当前活动：粉色高亮


# ------------ 蓝色 ---------------------- 
# set -g pane-border-style        'fg=#cccccc'                                                    # 非活动面板边框：浅灰色
# set -g pane-active-border-style 'fg=#4a7eda'                                                    # 当前活动面板边框：蓝色高亮


set -g pane-border-lines        single                                                            # 边框使用单线（细线风格）
set -g pane-border-status       off                                                               # 不在面板边框上显示标题



# ── 消息提示 ──────────────────────────────────────────────────────────────────
# ------------ 粉色 ----------------------
set -g message-style 'fg=#ffffff,bg=#ff85ad,bold'


# ------------ 蓝色 ---------------------- 
# set -g message-style 'fg=#ffffff,bg=#4a7eda,bold'                                               # 命令/提示信息：白字蓝底


